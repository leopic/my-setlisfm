appId: com.setlistfm.tracker
name: Artists → concerts → setlist → back chain
---
- launchApp
- tapOn:
    text: "Artists, tab.*"
- assertVisible:
    id: "artists-screen"
- tapOn:
    id: "artist-.*"
    index: 0
- assertVisible:
    id: "artist-concerts-screen"
- tapOn:
    id: "artist-concert-.*"
    index: 0
- assertVisible:
    id: "setlist-screen"
- tapOn:
    id: "back-button"
- assertVisible:
    id: "artist-concerts-screen"
- tapOn:
    id: "back-button"
- assertVisible:
    id: "artists-screen"

appId: com.setlistfm.tracker
name: Concerts tab → setlist detail → back
---
- launchApp
- tapOn: "Concerts"
- assertVisible: "My Concerts"
- tapOn:
    index: 0
    id: ".*concert.*"
    optional: true
# If concerts exist, tap the first one and verify setlist loads
- assertVisible:
    text: "← Back"
    optional: true
- tapOn:
    text: "← Back"
    optional: true

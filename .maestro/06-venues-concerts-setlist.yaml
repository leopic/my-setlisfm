appId: com.setlistfm.tracker
name: Venues → venue concerts → setlist → back chain
---
- launchApp
- tapOn:
    text: "Venues, tab.*"
- assertVisible:
    id: "venues-screen"
- scroll
- tapOn:
    id: "venue-.*"
    index: 0
- assertVisible:
    id: "venue-concerts-screen"
- tapOn:
    id: "venue-concert-.*"
    index: 0
- assertVisible:
    id: "setlist-screen"
- tapOn:
    id: "back-button"
- assertVisible:
    id: "venue-concerts-screen"
- tapOn:
    id: "back-button"
- assertVisible:
    id: "venues-screen"

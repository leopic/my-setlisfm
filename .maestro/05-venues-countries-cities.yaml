appId: com.setlistfm.tracker
name: Venues → Countries → country detail → back
---
- launchApp
- tapOn:
    text: "Venues, tab.*"
- assertVisible:
    id: "venues-screen"
- tapOn:
    id: "nav-countries"
- assertVisible:
    id: "countries-screen"
- tapOn:
    id: "back-button"
- assertVisible:
    id: "venues-screen"

appId: com.setlistfm.tracker
name: Venues → Continents → continent detail → back chain
---
- launchApp
- tapOn:
    text: "Venues, tab.*"
- assertVisible:
    id: "venues-screen"
- tapOn:
    id: "nav-continents"
- assertVisible:
    id: "continents-screen"
- tapOn:
    id: "continent-.*"
    index: 0
- assertVisible:
    id: "back-button"
- tapOn:
    id: "back-button"
- assertVisible:
    id: "continents-screen"
- tapOn:
    id: "back-button"
- assertVisible:
    id: "venues-screen"

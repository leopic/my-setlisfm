appId: com.setlistfm.tracker
name: Concerts → setlist → back
---
- launchApp
- tapOn:
    text: "Concerts, tab.*"
- assertVisible:
    id: "concerts-screen"
- tapOn:
    id: "concert-.*"
    index: 0
- assertVisible:
    id: "setlist-screen"
- tapOn:
    id: "back-button"
- assertVisible:
    id: "concerts-screen"
